<!DOCTYPE html>
<html>
<head>
  <title>CIA Builder</title>
</head>
<body>
  <h1>3DS CIA Builder</h1>

  <input id="name" placeholder="Nome do app" /><br><br>
  <input type="file" id="icon" /><br><br>
  <input type="file" id="banner" /><br><br>

  <button onclick="build()">Gerar CIA</button>

  <script>
    async function build() {
      const form = new FormData();
      form.append("name", document.getElementById("name").value);
      form.append("icon", document.getElementById("icon").files[0]);
      form.append("banner", document.getElementById("banner").files[0]);

      const res = await fetch("/build", {
        method: "POST",
        body: form
      });

      const blob = await res.blob();
      const url = window.URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "output.cia";
      a.click();
    }
  </script>
</body>
</html>
